syntax = "proto3";

package user;
option go_package = "./gen;user_pb";

message LogEntry {
    int32 device_id = 1;
    string message = 2;
    string level = 3;
}

message UploadSummary {
    int32 record_count = 1;
    string status = 2;
}

service UserService {
    rpc UploadLog(stream LogEntry) returns (UploadSummary);
}
