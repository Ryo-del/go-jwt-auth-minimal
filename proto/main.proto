syntax = "proto3";

package main;

option go_package = ".;main";


message CreateItemRequest {
    string title = 1;
}

message CreateItemResponse {}

message DoneItemRequest {
    string id = 1;
}

message DoneItemResponse {}


service TODO {
    rpc CreateItem(CreateItemRequest) returns (CreateItemResponse);
    rpc DoneItem(DoneItemRequest) returns (DoneItemResponse);
}